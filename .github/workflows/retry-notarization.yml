name: Retry Notarization

# Appleの初回Notarization精密検査が24時間以内に完了するはず
# このワークフローは1回実行後に自動削除すること
on:
  schedule:
    # 2026-04-16 06:00 UTC (JST 15:00) — 約24時間後
    - cron: '0 6 16 4 *'
  workflow_dispatch:

jobs:
  retrigger-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Retag and push to trigger release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.5.4")
          echo "Latest tag: $LATEST_TAG"
          
          # Parse version and increment patch
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New tag: $NEW_TAG"
          
          # Create and push new tag
          git tag -a "$NEW_TAG" -m "$NEW_TAG — Notarization retry (auto-scheduled)"
          git push origin "$NEW_TAG"
          echo "Pushed $NEW_TAG — Release workflow will be triggered"
