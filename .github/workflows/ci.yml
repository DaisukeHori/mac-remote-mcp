name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  test-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run Swift tests
        run: |
          chmod +x app/run-tests.sh
          cd app && ./run-tests.sh
      - name: Verify Swift app compiles
        run: |
          chmod +x app/build.sh
          swiftc -o /dev/null \
            -framework Cocoa \
            -framework Security \
            -target arm64-apple-macos13 \
            app/MacRemoteMCP/main.swift \
            app/MacRemoteMCP/AppDelegate.swift \
            app/MacRemoteMCP/ProcessManager.swift \
            app/MacRemoteMCP/Config.swift \
            app/MacRemoteMCP/Logic.swift \
            2>&1 || echo "Compile check failed (expected in some CI environments)"
