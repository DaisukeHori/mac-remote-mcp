name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  test-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run Swift tests
        run: |
          chmod +x app/run-tests.sh
          cd app && ./run-tests.sh

  build-macos-app:
    needs: [test-node, test-swift]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: |
          chmod +x app/build.sh
          cd app && ./build.sh

      - name: Verify build artifacts
        run: |
          ls -la app/build/
          ls -la app/build/MacRemoteMCP.app/Contents/MacOS/
          ls -la app/build/MacRemoteMCP.app/Contents/Resources/mcp-server/dist/
          file app/build/MacRemoteMCP.app/Contents/MacOS/MacRemoteMCP
          test -f app/build/MacRemoteMCP.dmg
          test -f app/build/MacRemoteMCP-macOS.zip

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MacRemoteMCP ${{ steps.version.outputs.version }}"
          body: |
            ## MacRemoteMCP ${{ steps.version.outputs.version }}

            macOSメニューバーアプリ + MCPサーバー（34ツール, 775テスト）

            ### インストール方法
            1. `MacRemoteMCP.dmg` をダウンロード
            2. DMGをマウント（ダブルクリック）
            3. `MacRemoteMCP.app` を `Applications` にドラッグ&ドロップ
            4. `MacRemoteMCP.app` を起動
            5. メニューバーのアイコンから "Start All" をクリック

            ### 初回セットアップ
            macOS が以下の権限を要求します（System Settings → Privacy & Security）:
            - **Accessibility** — マウス/キーボード操作
            - **Screen Recording** — スクリーンショット
            - **Automation** — アプリ制御

            ### 必要なもの
            - macOS 13.0+
            - Node.js 20+ (`brew install node`)
            - tmux (`brew install tmux`)
          files: |
            app/build/MacRemoteMCP.dmg
            app/build/MacRemoteMCP-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
