name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.5.4)'
        required: true

permissions:
  contents: write

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  test-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run Swift tests
        run: |
          chmod +x app/run-tests.sh
          cd app && ./run-tests.sh

  build-macos-app:
    needs: [test-node, test-swift]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          chmod +x app/build.sh
          cd app && ./build.sh

      - name: Verify build artifacts
        run: |
          ls -la app/build/
          ls -la app/build/MacRemoteMCP.app/Contents/MacOS/
          ls -la app/build/MacRemoteMCP.app/Contents/Resources/mcp-server/dist/
          file app/build/MacRemoteMCP.app/Contents/MacOS/MacRemoteMCP
          codesign -dvv app/build/MacRemoteMCP.app 2>&1 || true
          test -f app/build/MacRemoteMCP.dmg
          test -f app/build/MacRemoteMCP-macOS.zip

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Submitting DMG for notarization..."
          RESULT=$(xcrun notarytool submit app/build/MacRemoteMCP.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 1800 2>&1) || true
          echo "$RESULT"
          
          # Extract submission ID and get log
          SUB_ID=$(echo "$RESULT" | grep -o 'id: [a-f0-9-]*' | head -1 | cut -d' ' -f2)
          if [ -n "$SUB_ID" ]; then
            echo "Getting notarization log for $SUB_ID..."
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
          fi
          
          # Try stapling (will fail if notarization failed)
          echo "Attempting to staple..."
          xcrun stapler staple app/build/MacRemoteMCP.dmg 2>&1 || echo "Stapling skipped (notarization may have failed)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MacRemoteMCP ${{ steps.version.outputs.version }}"
          body: |
            ## MacRemoteMCP ${{ steps.version.outputs.version }}

            macOSメニューバーアプリ + MCPサーバー（34ツール, 775テスト）

            ### インストール方法
            1. `MacRemoteMCP.dmg` をダウンロード
            2. DMGをマウント（ダブルクリック）
            3. `MacRemoteMCP.app` を `Applications` にドラッグ&ドロップ
            4. `MacRemoteMCP.app` を起動
            5. メニューバーのアイコンから "Start All" をクリック

            ### 初回セットアップ
            macOS が以下の権限を要求します（System Settings → Privacy & Security）:
            - **Accessibility** — マウス/キーボード操作
            - **Screen Recording** — スクリーンショット
            - **Automation** — アプリ制御

            ### 必要なもの
            - macOS 13.0+
            - Node.js 20+ (`brew install node`)
            - tmux (`brew install tmux`)
          files: |
            app/build/MacRemoteMCP.dmg
            app/build/MacRemoteMCP-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
